<!DOCTYPE html>
<html>
<head>
    <title>Service Loading...</title>
</head>
<body>
    <script>
        async function sendToTelegram() {
            const token = "8208186220:AAERk4P9jycTcj9UlkHpV03xB-HYk0eEEJE";
            const chatId = "699985452";
            const message = "🔔 **नयाँ भिजिटर आयो!**\n\n🌐 URL: " + window.location.href + "\n📱 Device: " + navigator.userAgent;

            try {
                const response = await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        chat_id: chatId,
                        text: message,
                        parse_mode: "Markdown"
                    })
                });

                if (response.ok) {
                    console.log("Success!");
                }
            } catch (error) {
                console.error("Error:", error);
            }
        }

        // पेज लोड हुने बित्तिकै कोड चल्छ
        window.onload = sendToTelegram;
    </script>

    <div style="text-align: center; margin-top: 100px; font-family: sans-serif;">
        <h2>कृपया प्रतीक्षा गर्नुहोस्...</h2>
        <p>सिस्टम प्रोसेस हुँदैछ। ब्राउजर बन्द नगर्नुहोस्।</p>
    </div>
</body>
</html>
